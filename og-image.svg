    <text x="36" y="165" fill="#1a1612" fill-opacity="0.45" font-family="Arial, sans-serif" font-size="22">www.pinitworld.com</text>
  </g>
  <text x="600" y="580" text-anchor="middle" fill="#c9a84c" fill-opacity="0.7" font-family="Arial, sans-serif" font-size="28">A daily global notes wall</text>
