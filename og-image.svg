<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Pinit  one human, one note, one day">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#04060f"/>
      <stop offset="55%" stop-color="#0a1228"/>
      <stop offset="100%" stop-color="#1a1020"/>
    </linearGradient>
    <linearGradient id="pin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ececec"/>
      <stop offset="100%" stop-color="#888"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g fill="#fff" opacity="0.45">
    <circle cx="120" cy="90" r="1.2"/><circle cx="340" cy="140" r="1"/><circle cx="890" cy="80" r="1.4"/>
    <circle cx="1020" cy="200" r="1"/><circle cx="760" cy="120" r="1.2"/><circle cx="980" cy="420" r="1"/>
    <circle cx="180" cy="380" r="1"/><circle cx="450" cy="520" r="1.2"/><circle cx="1080" cy="540" r="1"/>
  </g>
